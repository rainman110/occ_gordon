name: Build process

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: occ_gordon-ci
          channels: conda-forge
          channel-priority: strict
          cache-environment: true
          cache-downloads: true
          create-args: >-
            occt=7.9.3
            cmake
            ninja
            swig
            cxx-compiler
            gtest

      - name: Configure CMake
        shell: bash -el {0}
        run: >-
          cmake -S . -B build
          -G Ninja
          -DBUILD_SHARED_LIBS=ON
          -DOCC_GORDON_BUILD_TESTS=ON
          -DOpenCASCADE_DIR="$CONDA_PREFIX/lib/cmake/opencascade"
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash -el {0}
        run: cmake --build build --parallel

      - name: Run tests
        shell: bash -el {0}
        run: |
          set +e
          mkdir -p test-results
          build/tests/unittests/occ_gordon-unittests --gtest_output=xml:test-results/occ_gordon-unittests.xml
          unit_status=$?
          build/tests/apitests/occ_gordon-apitest --gtest_output=xml:test-results/occ_gordon-apitest.xml
          api_status=$?
          exit $((unit_status || api_status))

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/*.xml

      - name: Store test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: occ_gordon-test-results
          path: test-results
